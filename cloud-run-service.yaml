apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: oracle-api
  annotations:
    run.googleapis.com/cloudsql-instances: YOUR_PROJECT_ID:us-central1:oracle-db
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cloudsql-instances: YOUR_PROJECT_ID:us-central1:oracle-db
      labels:
        run.googleapis.com/startupProbeType: Default
    spec:
      serviceAccountName: oracle-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 30
      containers:
        - image: us-central1-docker.pkg.dev/YOUR_PROJECT_ID/oracle/oracle-api:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: TZ
              value: Asia/Taipei
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: DATABASE_URL
                  key: latest
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: JWT_SECRET
                  key: latest
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: INTERNAL_API_SECRET
                  key: latest
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_CLIENT_ID
                  key: latest
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: TELEGRAM_BOT_TOKEN
                  key: latest
            - name: GCS_BUCKET
              valueFrom:
                secretKeyRef:
                  name: GCS_BUCKET
                  key: latest
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ANTHROPIC_API_KEY
                  key: latest
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: ALLOWED_ORIGINS
                  key: latest
            - name: APPLE_TEAM_ID
              valueFrom:
                secretKeyRef:
                  name: APPLE_TEAM_ID
                  key: latest
            - name: APPLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: APPLE_CLIENT_ID
                  key: latest
  traffic:
    - percent: 100
      latestRevision: true
