steps:
  # ── 1. Build slim API image ────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-api
    args:
      - build
      - -f
      - Dockerfile.api
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-api:${SHORT_SHA}'
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-api:latest'
      - .

  # ── 2. Build full pipeline image (cron jobs + Telegram bot) ───────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-pipeline
    args:
      - build
      - -f
      - Dockerfile
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-pipeline:${SHORT_SHA}'
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-pipeline:latest'
      - .

  # ── 3. Push API image ──────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-api
    waitFor: [build-api]
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-api'

  # ── 4. Push pipeline image ─────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-pipeline
    waitFor: [build-pipeline]
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-pipeline'

  # ── 5. Deploy Alembic migration as a Cloud Run Job ─────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-migration-job
    waitFor: [push-api]
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - oracle-migrate
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-api:${SHORT_SHA}
      - --region=${_REGION}
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest
      - --command=alembic
      - --args=upgrade,head
      - --max-retries=1
      - --service-account=oracle-sa@${PROJECT_ID}.iam.gserviceaccount.com
      - --add-cloudsql-instances=${PROJECT_ID}:${_REGION}:oracle-db

  # ── 6. Run the migration job ───────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: run-migration
    waitFor: [deploy-migration-job]
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - oracle-migrate
      - --region=${_REGION}
      - --wait

  # ── 7. Deploy API service ──────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-api
    waitFor: [run-migration]
    entrypoint: gcloud
    args:
      - run
      - services
      - replace
      - cloud-run-service.yaml
      - --region=${_REGION}

  # ── 8. Deploy Telegram bot service (always-on) ────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-telegram
    waitFor: [push-pipeline]
    entrypoint: gcloud
    args:
      - run
      - services
      - replace
      - cloud-run-telegram.yaml
      - --region=${_REGION}

  # ── 9. Deploy predict Cloud Run Job ───────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-job-predict
    waitFor: [push-pipeline]
    entrypoint: gcloud
    args:
      - run
      - jobs
      - replace
      - cloud-run-job-predict.yaml
      - --region=${_REGION}

  # ── 10. Deploy resolve Cloud Run Job ──────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-job-resolve
    waitFor: [push-pipeline]
    entrypoint: gcloud
    args:
      - run
      - jobs
      - replace
      - cloud-run-job-resolve.yaml
      - --region=${_REGION}

  # ── 11. Build Next.js web dashboard image ─────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-web
    args:
      - build
      - -f
      - web/Dockerfile.web
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-web:${SHORT_SHA}'
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-web:latest'
      - web/

  # ── 12. Push web image ─────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-web
    waitFor: [build-web]
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-web'

  # ── 13. Deploy web dashboard service ──────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-web
    waitFor: [push-web]
    entrypoint: gcloud
    args:
      - run
      - services
      - deploy
      - oracle-web
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-web:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --min-instances=0
      - --max-instances=5
      - --set-env-vars=NODE_ENV=production
      - --set-secrets=ORACLE_API_URL=ORACLE_API_URL:latest

  # ── 14. Deploy news poller Cloud Run Job ──────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-job-news
    waitFor: [push-pipeline]
    entrypoint: gcloud
    args:
      - run
      - jobs
      - replace
      - cloud-run-job-news.yaml
      - --region=${_REGION}

substitutions:
  _REGION: us-central1

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-api:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-api:latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-pipeline:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-pipeline:latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-web:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/oracle/oracle-web:latest'

options:
  logging: CLOUD_LOGGING_ONLY
