apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: oracle-news-poller
  labels:
    app: oracle-pipeline
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cloudsql-instances: YOUR_PROJECT_ID:us-central1:oracle-db
    spec:
      serviceAccountName: oracle-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com
      template:
        spec:
          containers:
            - image: us-central1-docker.pkg.dev/YOUR_PROJECT_ID/oracle/oracle-pipeline:latest
              command: ["python", "news_pipeline.py"]
              resources:
                limits:
                  memory: 512Mi
                  cpu: "1"
              env:
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: TZ
                  value: Asia/Taipei
                - name: GCS_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: GCS_BUCKET
                      key: latest
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: DATABASE_URL
                      key: latest
                - name: INTERNAL_API_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: INTERNAL_API_SECRET
                      key: latest
          timeoutSeconds: 300
          maxRetries: 0
