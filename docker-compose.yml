version: "3.9"

services:
  # ── Local PostgreSQL (replaces SQLite in dev) ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: stock_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       oracle
      POSTGRES_USER:     oracle
      POSTGRES_PASSWORD: oracle_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oracle"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: oracle-api
    container_name: stock_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./data_us:/app/data_us
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Taipei
      - DATABASE_URL=postgresql+psycopg2://oracle:oracle_dev_password@postgres:5432/oracle
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Analysis pipeline (cron-triggered) ────────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: stock-pipeline
    container_name: stock_pipeline
    restart: "no"
    depends_on:
      - api
    volumes:
      - ./data:/app/data
      - ./data_us:/app/data_us
      - ./.env:/app/.env:ro
      - ./brokers/.ctbc_profile:/app/brokers/.ctbc_profile
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Taipei
    command: ["python", "master_run.py"]
    profiles:
      - pipeline   # docker compose --profile pipeline up pipeline

volumes:
  postgres_data:
