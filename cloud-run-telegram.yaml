apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: oracle-telegram-bot
  annotations:
    run.googleapis.com/ingress: internal
    run.googleapis.com/cloudsql-instances: YOUR_PROJECT_ID:us-central1:oracle-db
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/cloudsql-instances: YOUR_PROJECT_ID:us-central1:oracle-db
    spec:
      serviceAccountName: oracle-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 1
      timeoutSeconds: 3600
      containers:
        - image: us-central1-docker.pkg.dev/YOUR_PROJECT_ID/oracle/oracle-pipeline:latest
          command: ["python", "app.py"]
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: TZ
              value: Asia/Taipei
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: TELEGRAM_BOT_TOKEN
                  key: latest
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: TELEGRAM_CHAT_ID
                  key: latest
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ANTHROPIC_API_KEY
                  key: latest
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: DATABASE_URL
                  key: latest
            - name: GCS_BUCKET
              valueFrom:
                secretKeyRef:
                  name: GCS_BUCKET
                  key: latest
  traffic:
    - percent: 100
      latestRevision: true
