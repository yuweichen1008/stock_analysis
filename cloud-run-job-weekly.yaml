apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: oracle-weekly-signals
  labels:
    app: oracle-pipeline
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cloudsql-instances: YOUR_PROJECT_ID:us-central1:oracle-db
    spec:
      serviceAccountName: oracle-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com
      template:
        spec:
          containers:
            - image: us-central1-docker.pkg.dev/YOUR_PROJECT_ID/oracle/oracle-pipeline:latest
              command: ["python", "weekly_signal_pipeline.py"]
              resources:
                limits:
                  memory: 1Gi
                  cpu: "2"
              env:
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: TZ
                  value: America/New_York
                - name: WEEKLY_DRY_RUN
                  value: "true"
                - name: WEEKLY_BROKER
                  value: "Robinhood"
                - name: GCS_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: GCS_BUCKET
                      key: latest
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: DATABASE_URL
                      key: latest
                - name: INTERNAL_API_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: INTERNAL_API_SECRET
                      key: latest
          timeoutSeconds: 900
          maxRetries: 1
